version: 2

sources:
  - name: thelook
    description: >
      Dataset público `thelook_ecommerce`: esquema de un distribuidor de
      e-commerce (catálogo, inventario, órdenes, usuarios y eventos web).
      Solo lectura; se referencia siempre vía `source()`.
    database: bigquery-public-data
    schema: thelook_ecommerce

    tables:
      - name: orders
        description: Cabecera de órdenes, un registro por orden.
        config:
          loaded_at_field: created_at
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 72, period: hour}

      - name: order_items
        description: Líneas de orden, un registro por ítem vendido.

      - name: products
        description: Catálogo de productos.

      - name: users
        description: Usuarios / clientes.

      - name: inventory_items
        description: Ítems de inventario; cada unidad física con su costo y estado (en stock vs vendido).

      - name: distribution_centers
        description: Centros de distribución.

      - name: events
        description: Eventos de navegación web (sesiones, tráfico, tipo de evento).
