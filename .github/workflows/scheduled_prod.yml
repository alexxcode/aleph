name: Prod (scheduled)

# Corrida diaria contra `analytics`. Usa --full-refresh porque la fuente pública
# thelook se regenera (reasigna order_id a nuevas fechas) y con insert_overwrite
# eso dejaría filas huérfanas entre particiones. Publica manifest.json como
# artefacto para el --defer del Slim CI de los PRs.
#
# Autenticación keyless con Workload Identity Federation (sin keyfile).

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC diario
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          project_id: aleph12
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dbt
        run: pip install -r requirements.txt

      - name: Generar profiles.yml de prod
        run: |
          mkdir -p "$HOME/.dbt"
          cat > "$HOME/.dbt/profiles.yml" <<EOF
          aleph:
            target: prod
            outputs:
              prod:
                type: bigquery
                method: oauth
                project: aleph12
                dataset: analytics
                location: US
                threads: 8
                maximum_bytes_billed: 50000000000
          EOF

      - name: dbt deps
        run: dbt deps

      - name: dbt build (prod, full-refresh)
        run: dbt build --full-refresh

      - name: Generar docs
        run: dbt docs generate

      - name: Publicar manifest de prod (para Slim CI)
        uses: actions/upload-artifact@v4
        with:
          name: prod-manifest
          path: target/manifest.json
          retention-days: 30
